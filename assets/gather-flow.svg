  <text x="510" y="630" fill="#A8D1DB" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="600">Key point</text>
  <text x="510" y="662" fill="#F2F7FA" font-family="IBM Plex Sans, Arial, sans-serif" font-size="26">The gather path is a regularization path, not merely a retrieval path.</text>
