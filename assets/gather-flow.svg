    <text x="1051" y="490" fill="#F2F7FA" font-size="26" font-weight="600">Execution-ready output</text>

    <circle cx="1420" cy="410" r="44" fill="#102633" stroke="#6AA5B7"/>
    <text x="1398" y="418" fill="#A8D1DB" font-size="24" font-weight="700">06</text>
