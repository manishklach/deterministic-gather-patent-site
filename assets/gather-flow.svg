  <text x="90" y="148" fill="#8FA6B6" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22">From logical request to execution-ready output</text>
  <g font-family="IBM Plex Sans, Arial, sans-serif">
    <circle cx="170" cy="410" r="44" fill="#102633" stroke="#6AA5B7"/>
