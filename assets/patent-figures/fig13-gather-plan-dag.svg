  <line x1="1012" y1="290" x2="1142" y2="290" stroke="#111" stroke-width="2"/>

  <rect x="94" y="548" width="1180" height="210" fill="none" stroke="#111"/>
  <text x="122" y="586" font-family="Arial, sans-serif" font-size="16">The directed acyclic structure represents dependencies among fetch, remote transfer, decompression, reformatting, staging, and output-emission operations.</text>
  <text x="122" y="620" font-family="Arial, sans-serif" font-size="16">The deterministic gather engine schedules execution according to dependency order rather than simple linear traversal.</text>
  <text x="122" y="654" font-family="Arial, sans-serif" font-size="16">The dashed-node branch illustrates mixed-tier overlap involving a remote or colder source.</text>
