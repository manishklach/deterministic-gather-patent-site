  <text x="1156" y="286" font-family="Arial, sans-serif" font-size="16">Tile /</text>
  <text x="1148" y="308" font-family="Arial, sans-serif" font-size="16">Descriptor</text>

  <line x1="224" y1="270" x2="376" y2="230" stroke="#111" stroke-width="2"/>
  <line x1="224" y1="290" x2="376" y2="350" stroke="#111" stroke-width="2"/>
  <line x1="464" y1="220" x2="630" y2="220" stroke="#111" stroke-width="2"/>
  <line x1="464" y1="360" x2="630" y2="360" stroke="#111" stroke-width="2"/>
