  <text x="60" y="104" font-family="Arial, sans-serif" font-size="22">Gather-Plan Dependency DAG</text>
  <text x="94" y="146" font-family="Arial, sans-serif" font-size="18" font-weight="700">136 Gather Plan</text>

  <circle cx="180" cy="280" r="44" fill="none" stroke="#111" stroke-width="2"/>
  <text x="145" y="286" font-family="Arial, sans-serif" font-size="16">Fetch A</text>
  <circle cx="420" cy="220" r="44" fill="none" stroke="#111" stroke-width="2"/>
  <text x="388" y="226" font-family="Arial, sans-serif" font-size="16">Fetch B</text>
  <circle cx="420" cy="360" r="44" fill="none" stroke="#111" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="380" y="366" font-family="Arial, sans-serif" font-size="16">Remote Fetch</text>
  <circle cx="680" cy="220" r="50" fill="none" stroke="#111" stroke-width="2"/>
  <text x="634" y="216" font-family="Arial, sans-serif" font-size="16">Decompress</text>
