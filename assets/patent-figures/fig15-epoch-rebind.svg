<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <rect width="1400" height="920" fill="#fff"/>
  <rect x="36" y="28" width="1328" height="856" fill="none" stroke="#111" stroke-width="2"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="26" font-weight="700">FIG. 15</text>
  <text x="60" y="104" font-family="Arial, sans-serif" font-size="22">Segment-Level Epoch-Change Rebind During Gather Validation</text>

  <rect x="90" y="150" width="260" height="68" fill="none" stroke="#111"/>
  <text x="126" y="190" font-family="Arial, sans-serif" font-size="18">Compiled Gather Plan 136</text>
  <rect x="450" y="150" width="260" height="68" fill="none" stroke="#111"/>
  <text x="482" y="190" font-family="Arial, sans-serif" font-size="18">Validate Against Current Epoch</text>
  <rect x="810" y="150" width="240" height="68" fill="none" stroke="#111"/>
  <text x="842" y="190" font-family="Arial, sans-serif" font-size="18">Stale Segment?</text>
  <rect x="1180" y="150" width="150" height="68" fill="none" stroke="#111"/>
  <text x="1216" y="190" font-family="Arial, sans-serif" font-size="18">Launch</text>

  <line x1="350" y1="184" x2="450" y2="184" stroke="#111" stroke-width="2"/>
  <line x1="710" y1="184" x2="810" y2="184" stroke="#111" stroke-width="2"/>
  <line x1="1050" y1="184" x2="1180" y2="184" stroke="#111" stroke-width="2"/>
  <text x="1088" y="168" font-family="Arial, sans-serif" font-size="16">No</text>

  <line x1="930" y1="218" x2="930" y2="316" stroke="#111" stroke-width="2"/>
  <text x="944" y="274" font-family="Arial, sans-serif" font-size="16">Yes</text>

  <rect x="530" y="336" width="260" height="78" fill="none" stroke="#111"/>
  <text x="560" y="370" font-family="Arial, sans-serif" font-size="18">Replacement Source Descriptor 132</text>
  <text x="610" y="396" font-family="Arial, sans-serif" font-size="16">rebind branch</text>
  <rect x="920" y="336" width="260" height="78" fill="none" stroke="#111"/>
  <text x="964" y="370" font-family="Arial, sans-serif" font-size="18">Regenerate Gather Plan 136</text>
  <text x="1000" y="396" font-family="Arial, sans-serif" font-size="16">fallback branch</text>

  <line x1="930" y1="316" x2="660" y2="336" stroke="#111" stroke-width="2"/>
  <line x1="930" y1="316" x2="1050" y2="336" stroke="#111" stroke-width="2"/>

  <rect x="530" y="520" width="260" height="74" fill="none" stroke="#111"/>
  <text x="570" y="554" font-family="Arial, sans-serif" font-size="18">Preserve Segment Order</text>
  <text x="610" y="580" font-family="Arial, sans-serif" font-size="16">deterministic</text>
  <rect x="920" y="520" width="260" height="74" fill="none" stroke="#111"/>
  <text x="978" y="554" font-family="Arial, sans-serif" font-size="18">Revalidated Plan</text>
  <text x="980" y="580" font-family="Arial, sans-serif" font-size="16">ready for execution</text>
  <rect x="1260" y="520" width="90" height="74" fill="none" stroke="#111"/>
  <text x="1284" y="564" font-family="Arial, sans-serif" font-size="18">Go</text>

  <line x1="660" y1="414" x2="660" y2="520" stroke="#111" stroke-width="2"/>
  <line x1="1050" y1="414" x2="1050" y2="520" stroke="#111" stroke-width="2"/>
  <line x1="790" y1="557" x2="920" y2="557" stroke="#111" stroke-width="2"/>
  <line x1="1180" y1="557" x2="1260" y2="557" stroke="#111" stroke-width="2"/>

  <text x="92" y="760" font-family="Arial, sans-serif" font-size="18" font-weight="700">Distinct alternatives</text>
  <text x="92" y="794" font-family="Arial, sans-serif" font-size="16">First branch: segment-level rebind to a replacement source descriptor.</text>
  <text x="92" y="822" font-family="Arial, sans-serif" font-size="16">Second branch: fallback plan regeneration when direct rebind is unsuitable.</text>
